<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>404 - Page Not Found</title>

<style>
  body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background: #f5f5f5;
    color: #333;
    display: flex;
    height: 100vh;
    align-items: center;
    justify-content: center;
  }

  .container {
    text-align: center;
  }

  h1 {
    font-size: 96px;
    margin: 0;
  }

  h2 {
    margin: 10px 0 20px;
    font-weight: normal;
  }

  p {
    color: #666;
  }

  a {
    display: inline-block;
    margin-top: 20px;
    padding: 10px 20px;
    text-decoration: none;
    background: #007bff;
    color: white;
    border-radius: 6px;
  }

  a:hover {
    background: #0056b3;
  }
</style>
</head>

<body>

<div class="container">
  <h1>404</h1>
  <h2>Page Not Found</h2>
  <p>The page you are looking for does not exist.</p>
  <a href="/">Go Home</a>
</div>

</body>
</html>
